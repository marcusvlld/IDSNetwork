server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  - job_name: sentinelnet

    static_configs:

      - targets:
          - localhost

        labels:
          job: sentinelnet
          __path__: /logs/alerts.json

    pipeline_stages:

      - json:
          expressions:
            timestamp: timestamp
            event: event
            source_ip: source_ip
            destination_ip: destination_ip
            severity: severity

      - labels:
          event:
          severity:
          source_ip:
